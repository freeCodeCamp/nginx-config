# ---------------------------
# socrates.freecodecamp.dev
# ---------------------------

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;

  server_name socrates.freecodecamp.dev;

  # SSL
  include snippets/common/ssl-freecodecamp-dev.conf;

  # security
  include snippets/common/security.conf;

  # reverse proxy socrates
  location / {
    proxy_pass http://socrates;
    include snippets/common/proxy-params.conf;
  }

  # robots.txt
  location = /robots.txt {
    alias /etc/nginx/snippets/files/00-default.robots.txt;
    expires 15d;
    add_header Cache-Control "public";

    log_not_found off;
    access_log off;
  }

  # additional config
  include snippets/common/general.conf;
}

# HTTP redirect
server {
  listen 80;
  listen [::]:80;

  server_name socrates.freecodecamp.dev;

  return 301 https://socrates.freecodecamp.dev$request_uri;
}
